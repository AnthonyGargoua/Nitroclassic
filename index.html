<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ON AIR - TRAINING</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-content">
            <span class="brand">ON <span class="accent">AIR</span></span>
            <h1 id="current-day-name">Lundi</h1>
            <div class="session-meta">
                <p id="current-specialty">Push - Pecs/Epaules</p>
                <p id="session-duration"><i class="far fa-clock"></i> -- min</p>
            </div>
        </div>
    </header>

    <main id="app">
        <div id="floating-timer" class="hidden" onclick="resetTimer()">
            <span id="timer-display">01:30</span>
        </div>

        <section id="workout-list">
            </section>
    </main>

    <nav class="tab-bar">
        <button onclick="loadDay('Lundi')" class="nav-item"><span>LUN</span></button>
        <button onclick="loadDay('Mardi')" class="nav-item"><span>MAR</span></button>
        <button onclick="loadDay('Mercredi')" class="nav-item"><span>MER</span></button>
        <button onclick="loadDay('Jeudi')" class="nav-item"><span>JEU</span></button>
        <button onclick="loadDay('Vendredi')" class="nav-item"><span>VEN</span></button>
        <button onclick="loadDay('Samedi')" class="nav-item"><span>SAM</span></button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
