<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyTraining - Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>ON <span class="accent">AIR</span> SESSION</h1>
            <p id="current-day-display">Lundi - Push</p>
        </div>
    </header>

    <main id="app">
        <section id="timer-section">
            <div class="timer-card">
                <div id="timer-display">01:30</div>
                <div class="timer-controls">
                    <button onclick="startTimer(60)">1m</button>
                    <button onclick="startTimer(90)" class="active">1m30</button>
                    <button onclick="resetTimer()"><i class="fas fa-undo"></i></button>
                </div>
            </div>
        </section>

        <section id="workout-list">
            </section>
    </main>

    <nav class="tab-bar">
        <button onclick="loadDay('Lundi')" class="nav-item active"><i class="fas fa-bolt"></i><span>Push</span></button>
        <button onclick="loadDay('Mardi')" class="nav-item"><i class="fas fa-backspace"></i><span>Pull</span></button>
        <button onclick="loadDay('Mercredi')" class="nav-item"><i class="fas fa-dumbbell"></i><span>Legs</span></button>
        <button onclick="toggleStats()" class="nav-item"><i class="fas fa-chart-line"></i><span>Stats</span></button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
